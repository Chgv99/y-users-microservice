name: Test & Push Project

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'        # cache ~/.m2 for faster builds

      - name: Run tests
        run: mvn test

      - name: Publish results
        uses: actions/upload-artifact@v4
        if: always()            # uploads the report
        with:
          name: test-results
          path: target/surefire-reports/

  push:
    runs-on: ubuntu-latest
    needs: test                          # waits for tests to pass
    if: github.event_name == 'push'      # only on push, not pull_request
    environment: dockerhub
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Login to Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags:
            ${{ secrets.DOCKERHUB_USERNAME }}/y-users-microservice:latest
        
