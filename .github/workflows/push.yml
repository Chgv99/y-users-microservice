name: Push Project

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest
    environment: dockerhub
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from merge commit
        id: semver
        run: |
          RAW=$(echo "${{ github.event.head_commit.message }}" | grep -oP 'v?\d+\.\d+\.\d+' | head -1)
          if [ -z "$RAW" ]; then
            echo "No version found in commit message"
            exit 1
          fi
          VERSION=${RAW#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.semver.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/y-users-microservice:${{ steps.semver.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/y-users-microservice:latest

      - name: Create git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v${{ steps.semver.outputs.version }}
          git push origin v${{ steps.semver.outputs.version }}
