name: Test Project

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'        # cache ~/.m2 for fater builds
      - name: Run tests
        run: mvn test
      - name: Publish results
        uses: actions/upload-artifact@v4
        if: always()            # sube el reporte aunque fallen los tests
        with:
          name: test-results
          path: target/surefire-reports/
        