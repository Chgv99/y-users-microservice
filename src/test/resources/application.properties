spring.application.name=users
server.port=8080

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#validate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=true
# spring.flyway.baseline-on-migrate=true
# spring.flyway.baseline-version=0
spring.flyway.user=sa
spring.flyway.password=
spring.flyway.schemas=users

# spring.flyway.validateMigrationNaming=true

application.security.jwt.secret-key=test-secret-key-that-is-long-enough-for-hmac
application.security.jwt.expiration=3600000
application.security.refresh_token.expiration=7

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=rabbit
spring.rabbitmq.password=rabbit